name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.6'
          channel: stable
      - name: Fix pubspec
        run: |
          cd localeats
          sed -i '/^  sdk:/c\  sdk: ">=3.0.0 <4.0.0"' pubspec.yaml
          sed -i 's/flutter_lints: .*/flutter_lints: ^2.0.0/' pubspec.yaml
          sed -i 's/shared_preferences: .*/shared_preferences: ^2.2.0/' pubspec.yaml
          sed -i 's/image_picker: .*/image_picker: ^1.0.4/' pubspec.yaml
          sed -i 's/google_maps_flutter: .*/google_maps_flutter: ^2.3.0/' pubspec.yaml
          sed -i 's/flutter_facebook_auth: .*/flutter_facebook_auth: ^6.0.1/' pubspec.yaml
          sed -i 's/geolocator: .*/geolocator: ^10.1.0/' pubspec.yaml
          sed -i 's/firebase_core: .*/firebase_core: ^2.15.0/' pubspec.yaml
          sed -i 's/firebase_auth: .*/firebase_auth: ^4.9.0/' pubspec.yaml
          sed -i 's/cloud_firestore: .*/cloud_firestore: ^4.9.0/' pubspec.yaml
          sed -i 's/firebase_storage: .*/firebase_storage: ^11.2.0/' pubspec.yaml
          sed -i 's/google_sign_in: .*/google_sign_in: ^6.1.5/' pubspec.yaml
          sed -i 's/cached_network_image: .*/cached_network_image: ^3.2.3/' pubspec.yaml
          sed -i 's/provider: .*/provider: ^6.0.5/' pubspec.yaml
      
      - name: Fresh android setup
        run: |
          cd localeats
          cp android/app/google-services.json /tmp/gservices.json
          rm -rf android
          flutter create --platforms android --org com.localeats .
          cp /tmp/gservices.json android/app/google-services.json
          sed -i "s/apply plugin: 'com.android.application'/apply plugin: 'com.android.application'\napply plugin: 'com.google.gms.google-services'/" android/app/build.gradle
          sed -i "/classpath 'com.android.tools.build/i\\        classpath 'com.google.gms:google-services:4.3.15'" android/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle
          sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' android/app/build.gradle
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
    
      - name: Get packages
        run: cd localeats && flutter pub get
      - name: Build APK
        run: cd localeats && flutter build apk --release --no-tree-shake-icons
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LocalEats-APK
          path: localeats/build/app/outputs/flutter-apk/app-release.apk
