name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b 3.24.3 /opt/flutter
          echo "/opt/flutter/bin" >> $GITHUB_PATH

      - name: Fix packages
        run: |
          cd localeats
          sed -i 's/flutter_lints: .*/flutter_lints: ^3.0.0/' pubspec.yaml
          sed -i 's/shared_preferences: .*/shared_preferences: ^2.2.2/' pubspec.yaml
          sed -i 's/image_picker: .*/image_picker: ^1.0.4/' pubspec.yaml
          sed -i 's/google_maps_flutter: .*/google_maps_flutter: ^2.10.1/' pubspec.yaml

      - name: Setup local.properties
        run: |
          echo "flutter.sdk=/opt/flutter" > localeats/android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> localeats/android/local.properties
          echo "flutter.versionName=1.0.0" >> localeats/android/local.properties
          echo "flutter.versionCode=1" >> localeats/android/local.properties

      - name: Get packages
        run: |
          cd localeats
          flutter pub get

      - name: Build APK
        run: |
          cd localeats
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LocalEats-APK
          path: localeats/build/app/outputs/flutter-apk/app-release.apk
