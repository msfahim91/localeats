workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      flutter: 3.19.6
      java: 17
    scripts:
      - name: Get packages
        script: |
          cd localeats
          flutter pub get
      - name: Build APK
        script: |
          cd localeats
          flutter build apk --release --no-tree-shake-icons
    artifacts:
      - localeats/build/**/outputs/**/*.apk
