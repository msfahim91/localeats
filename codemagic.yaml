workflows:
  android-release:
    name: Android Release
    environment:
      flutter: 3.24.3
    scripts:
      - name: Get packages
        script: |
          cd localeats
          flutter pub get
      - name: Build APK
        script: |
          cd localeats
          flutter build apk --release
    artifacts:
      - localeats/build/**/outputs/**/*.apk
