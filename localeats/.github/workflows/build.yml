name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          cache: false
      - name: Flutter doctor
        run: flutter doctor -v
      - name: Get dependencies
        run: |
          cd localeats
          flutter pub get
      - name: Show gradle files
        run: |
          cat localeats/android/settings.gradle.kts
          cat localeats/android/gradle/wrapper/gradle-wrapper.properties
      - name: Build APK
        run: |
          cd localeats
          flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: release-apk
          path: localeats/build/app/outputs/flutter-apk/app-release.apk
