name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          cache: false
      - name: Get dependencies
        run: |
          cd localeats
          flutter pub get
      - name: Patch flutter gradle plugin
        run: |
          FLUTTER_PATH=$(flutter --version --machine | python3 -c "import sys,json; print(json.load(sys.stdin)['flutterRoot'])")
          PLUGIN_FILE="$FLUTTER_PATH/packages/flutter_tools/gradle/src/main/groovy/flutter.groovy"
          if [ -f "$PLUGIN_FILE" ]; then
            sed -i 's/project.tasks.register("generateLockfiles"/project.tasks.findByName("generateLockfiles") ?: project.tasks.register("generateLockfiles"/' "$PLUGIN_FILE"
          fi
      - name: Build APK
        run: |
          cd localeats
          flutter build apk --release --no-tree-shake-icons
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: release-apk
          path: localeats/build/app/outputs/flutter-apk/app-release.apk
